<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fffdf8;
    --ink: #2c2416;
    --ink-soft: #7a6e5f;
    --ink-faint: #b5a99a;
    --accent: #c17b3a;
    --accent-light: #f0d9c0;
    --green: #4a7c59;
    --green-light: #d4e8da;
    --blue: #3a6b9a;
    --blue-light: #cfe0f0;
    --rose: #a84f5a;
    --rose-light: #f0d4d7;
    --purple: #6b4a8a;
    --purple-light: #e0d4f0;
    --gold: #b8902a;
    --gold-light: #f5e8c0;
    --border: #e0d8cc;
    --shadow: rgba(44, 36, 22, 0.08);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    padding: 16px;
    gap: 14px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: var(--paper);
    border-radius: 20px;
    padding: 14px 22px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--border);
  }

  .weather-block { display: flex; align-items: center; gap: 10px; }
  .weather-icon { font-size: 32px; line-height: 1; }
  .weather-info {}
  .weather-temp { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--ink); line-height: 1; }
  .weather-desc { font-size: 12px; color: var(--ink-soft); font-weight: 500; margin-top: 2px; }

  .date-block { text-align: center; }
  .date-day { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--ink-soft); letter-spacing: 2px; text-transform: uppercase; }
  .date-full { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); line-height: 1.2; margin-top: 2px; }

  .clock-block { text-align: right; }
  .clock-time { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--ink); line-height: 1; letter-spacing: -1px; }
  .clock-ampm { font-size: 14px; color: var(--ink-soft); font-weight: 500; }

  /* ── MAIN AREA ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 14px;
    min-height: 0;
  }

  /* ── CALENDAR ── */
  .cal-panel {
    background: var(--paper);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-nav {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px; height: 36px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    transition: background 0.15s;
  }
  .cal-nav:hover { background: var(--accent-light); color: var(--accent); }

  .cal-month-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); }

  .view-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
  }
  .view-btn {
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    transition: all 0.15s;
    font-family: 'Nunito', sans-serif;
  }
  .view-btn.active { background: var(--paper); color: var(--accent); box-shadow: 0 1px 4px var(--shadow); }

  /* ── MONTH VIEW ── */
  .cal-grid { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 6px;
  }
  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-faint);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 0;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 3px;
    flex: 1;
    min-height: 0;
  }
  .day-cell {
    border-radius: 10px;
    padding: 5px 6px;
    background: var(--bg);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .day-cell:hover { border-color: var(--border); background: #ede8df; }
  .day-cell.empty { background: transparent; cursor: default; }
  .day-cell.today { background: var(--accent-light); border-color: var(--accent); }
  .day-cell.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
  .day-cell.other-month { opacity: 0.4; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1;
    margin-bottom: 3px;
  }
  .day-cell.today .day-num { color: var(--accent); font-weight: 700; }

  .event-dot-row { display: flex; flex-wrap: wrap; gap: 2px; }
  .event-dot {
    height: 5px;
    border-radius: 3px;
    flex: 1;
    min-width: 5px;
    max-width: 18px;
  }
  .event-pill-sm {
    font-size: 9px;
    font-weight: 600;
    border-radius: 4px;
    padding: 1px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    margin-top: 1px;
    line-height: 1.4;
  }

  /* ── WEEK VIEW ── */
  .week-view { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow-y: auto; }
  .week-day {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .week-day:last-child { border-bottom: none; }
  .week-day-label {
    width: 48px;
    flex-shrink: 0;
    text-align: center;
  }
  .week-day-name { font-size: 10px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 1px; }
  .week-day-num { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink-soft); line-height: 1; }
  .week-day.today-row .week-day-num { color: var(--accent); }
  .week-events { flex: 1; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .week-event {
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .week-no-events { font-size: 12px; color: var(--ink-faint); font-style: italic; padding: 4px 0; }

  /* ── SIDEBAR ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .upcoming-panel {
    background: var(--paper);
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--border);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .event-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .event-list::-webkit-scrollbar { width: 4px; }
  .event-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event-card {
    border-radius: 12px;
    padding: 10px 12px;
    border-left: 3px solid;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .event-card:hover { transform: translateX(2px); }
  .event-card-title { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .event-card-time { font-size: 11px; color: var(--ink-soft); margin-top: 3px; font-weight: 500; }
  .event-card-date { font-size: 10px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }

  .loading-msg { font-size: 13px; color: var(--ink-soft); text-align: center; padding: 20px; font-style: italic; }
  .error-msg { font-size: 12px; color: var(--rose); text-align: center; padding: 10px; }

  /* ── EVENT COLORS ── */
  .ec-0 { background: var(--accent-light); border-color: var(--accent); }
  .ec-0 .event-dot, .week-event.ec-0 { background: var(--accent); color: var(--ink); }
  .ec-0 .event-pill-sm { background: var(--accent-light); color: var(--accent); }
  .ec-1 { background: var(--green-light); border-color: var(--green); }
  .ec-1 .event-dot, .week-event.ec-1 { background: var(--green); color: #fff; }
  .ec-1 .event-pill-sm { background: var(--green-light); color: var(--green); }
  .ec-2 { background: var(--blue-light); border-color: var(--blue); }
  .ec-2 .event-dot, .week-event.ec-2 { background: var(--blue); color: #fff; }
  .ec-2 .event-pill-sm { background: var(--blue-light); color: var(--blue); }
  .ec-3 { background: var(--rose-light); border-color: var(--rose); }
  .ec-3 .event-dot, .week-event.ec-3 { background: var(--rose); color: #fff; }
  .ec-3 .event-pill-sm { background: var(--rose-light); color: var(--rose); }
  .ec-4 { background: var(--purple-light); border-color: var(--purple); }
  .ec-4 .event-dot, .week-event.ec-4 { background: var(--purple); color: #fff; }
  .ec-4 .event-pill-sm { background: var(--purple-light); color: var(--purple); }
  .ec-5 { background: var(--gold-light); border-color: var(--gold); }
  .ec-5 .event-dot, .week-event.ec-5 { background: var(--gold); color: #fff; }
  .ec-5 .event-pill-sm { background: var(--gold-light); color: var(--gold); }
</style>
</head>
<body>
<div class="app">

// ── CLOCK & DATE ─────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clockTime').textContent = `${h}:${String(m).padStart(2,'0')}`;

}

// ── WEATHER ──────────────────────────────────────────────────────────────────
async function loadWeather() {
  try {
    const r = await fetch(`https://wttr.in/${ZIP}?format=j1`);
    const d = await r.json();
    const cur = d.current_condition[0];

function weatherEmoji(code) {
  if (code === 113) return '☀️';
  if (code === 116) return '⛅';
  if ([119,122].includes(code)) return '☁️';
  if ([143,248,260].includes(code)) return '🌫️';
  if ([176,263,266,293,296].includes(code)) return '🌦️';
  if ([299,302,305,308].includes(code)) return '🌧️';
  if ([200,386,389,392,395].includes(code)) return '⛈️';
  if ([227,230,320,323,326,329,332,335,338,350,368,371,374,377].includes(code)) return '❄️';
  return '🌤️';
}
loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);

// ── JWT / OAUTH ───────────────────────────────────────────────────────────────
async function getToken() {
  if (gcToken && Date.now() < gcTokenExpiry - 60000) return gcToken;
  try {
    const now = Math.floor(Date.now() / 1000);
    const header = { alg: 'RS256', typ: 'JWT' };
    const claim = {
      iss: SERVICE_ACCOUNT.client_email,
      scope: 'https://www.googleapis.com/auth/calendar.readonly',
      aud: 'https://oauth2.googleapis.com/token',
      exp: now + 3600,
      iat: now
    };

    const b64 = obj => btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const sigInput = `${b64(header)}.${b64(claim)}`;

    // Import the private key
    const pemContents = SERVICE_ACCOUNT.private_key
      .replace('-----BEGIN PRIVATE KEY-----', '')
      .replace('-----END PRIVATE KEY-----', '')
      .replace(/\s/g, '');
    const binaryKey = Uint8Array.from(atob(pemContents), c => c.charCodeAt(0));
    const cryptoKey = await crypto.subtle.importKey(
      'pkcs8', binaryKey.buffer,
      { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
      false, ['sign']
    );

    const enc = new TextEncoder();
    const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, enc.encode(sigInput));
    const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig)))
      .replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');

    const jwt = `${sigInput}.${sigB64}`;

    const resp = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
    });
    const data = await resp.json();
    if (!data.access_token) throw new Error(data.error_description || 'Token error');
    gcToken = data.access_token;
    gcTokenExpiry = Date.now() + (data.expires_in * 1000);
    return gcToken;
  } catch(e) {
    console.error('Token error:', e);
    document.getElementById('eventList').innerHTML = `<div class="error-msg">⚠️ Auth error:<br><small>${e.message}</small></div>`;
    return null;
  }
}

// ── FETCH EVENTS ─────────────────────────────────────────────────────────────
async function fetchEvents() {
  const token = await getToken();
  if (!token) {
    document.getElementById('eventList').innerHTML = '<div class="error-msg">⚠️ Could not connect to calendar.<br>Check that the service account has been shared your calendar.</div>';
    return;
  }

  // Fetch 3 months of events
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
  const end = new Date(now.getFullYear(), now.getMonth() + 3, 0).toISOString();

  try {
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=200`;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    const data = await r.json();
    if (data.error) throw new Error(data.error.message);

    allEvents = (data.items || []).map((ev, i) => {
      const start = ev.start?.dateTime || ev.start?.date;
      const end = ev.end?.dateTime || ev.end?.date;
      return {
        id: ev.id,
        title: ev.summary || '(No title)',
        start: new Date(start),
        end: end ? new Date(end) : null,
        allDay: !ev.start?.dateTime,
        colorKey: ev.colorId || (i % 6).toString()
      };
    });

    // Build color map (cycle through palette per unique colorId)
    const keys = [...new Set(allEvents.map(e => e.colorKey))];
    keys.forEach((k, i) => { colorMap[k] = COLOR_CLASSES[i % COLOR_CLASSES.length]; });

    renderCalendar();
    renderUpcoming();
  } catch(e) {
    console.error('Calendar fetch error:', e);
    document.getElementById('eventList').innerHTML = `<div class="error-msg">⚠️ ${e.message}</div>`;
  }
}

// ── RENDER CALENDAR ───────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthTitle').textContent =
    `${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

  if (currentView === 'month') renderMonth();
  else renderWeek();
}

function renderMonth() {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();

  let html = `<div class="day-labels">${DAYS.map(d => `<div class="day-label">${d}</div>`).join('')}</div>
  <div class="month-grid">`;

  for (let i = 0; i < first; i++) {
    html += `<div class="day-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(y, m, d);
    const isToday = date.toDateString() === today.toDateString();
    const dayEvents = eventsOnDate(date);

    html += `<div class="day-cell${isToday ? ' today' : ''}" onclick="selectDay(${y},${m},${d})">
      <div class="day-num">${d}</div>`;

    if (dayEvents.length) {
      html += `<div class="event-dot-row">`;
      dayEvents.slice(0, 3).forEach(ev => {
        const cls = colorMap[ev.colorKey] || 'ec-0';
        html += `<div class="event-dot ${cls}"></div>`;
      });
      html += `</div>`;
      if (dayEvents[0]) {
        const cls = colorMap[dayEvents[0].colorKey] || 'ec-0';
        html += `<div class="event-pill-sm ${cls}">${dayEvents[0].title}</div>`;
      }
    }

    html += `</div>`;
  }

  const remaining = 42 - first - daysInMonth;
  for (let i = 0; i < remaining; i++) html += `<div class="day-cell empty"></div>`;

  html += `</div>`;
  document.getElementById('calGrid').innerHTML = html;
}

function renderWeek() {
  const monday = getWeekStart(viewDate);
  const today = new Date();
  let html = `<div class="week-view">`;

  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const dayEvents = eventsOnDate(d);

    html += `<div class="week-day${isToday ? ' today-row' : ''}">
      <div class="week-day-label">
        <div class="week-day-name">${DAYS[d.getDay()]}</div>
        <div class="week-day-num">${d.getDate()}</div>
      </div>
      <div class="week-events">`;

    if (dayEvents.length === 0) {
      html += `<div class="week-no-events">No events</div>`;
    } else {
      dayEvents.slice(0, 3).forEach(ev => {
        const cls = colorMap[ev.colorKey] || 'ec-0';
        const time = ev.allDay ? 'All day' : formatTime(ev.start);
        html += `<div class="week-event ${cls}">${ev.title} <span style="font-weight:300;font-size:10px;">${time}</span></div>`;
      });
      if (dayEvents.length > 3) html += `<div class="week-no-events">+${dayEvents.length - 3} more</div>`;
    }

    html += `</div></div>`;
  }

  html += `</div>`;
  document.getElementById('calGrid').innerHTML = html;
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  return d;
}

// ── UPCOMING EVENTS ───────────────────────────────────────────────────────────
function renderUpcoming() {
  const now = new Date();
  const future = allEvents
    .filter(ev => ev.start >= now || ev.start.toDateString() === now.toDateString())
    .sort((a, b) => a.start - b.start)
    .slice(0, 15);

  if (future.length === 0) {
    document.getElementById('eventList').innerHTML = '<div class="loading-msg">No upcoming events</div>';
    return;
  }

  let lastDate = '';
  let html = '';
  future.forEach(ev => {
    const cls = colorMap[ev.colorKey] || 'ec-0';
    const dateStr = ev.start.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="event-card-date">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const time = ev.allDay ? 'All day' : `${formatTime(ev.start)}${ev.end ? ' – ' + formatTime(ev.end) : ''}`;
    html += `<div class="event-card ${cls}">
      <div class="event-card-title">${ev.title}</div>
      <div class="event-card-time">${time}</div>
    </div>`;
  });

  document.getElementById('eventList').innerHTML = html;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function eventsOnDate(date) {
  return allEvents.filter(ev => {
    const evDate = new Date(ev.start.getFullYear(), ev.start.getMonth(), ev.start.getDate());
    const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    return evDate.getTime() === target.getTime();
  });
}

function formatTime(date) {
  let h = date.getHours(), m = date.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${ampm}`;
}

function selectDay(y, m, d) {
  // Highlight selected day and show events
  document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
  event.currentTarget?.classList.add('selected');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btnMonth').classList.toggle('active', v === 'month');
  document.getElementById('btnWeek').classList.toggle('active', v === 'week');
  viewDate = new Date();
  renderCalendar();
}

document.getElementById('prevBtn').onclick = () => {
  if (currentView === 'month') viewDate.setMonth(viewDate.getMonth() - 1);
  else viewDate.setDate(viewDate.getDate() - 7);
  renderCalendar();
};
document.getElementById('nextBtn').onclick = () => {
  if (currentView === 'month') viewDate.setMonth(viewDate.getMonth() + 1);
  else viewDate.setDate(viewDate.getDate() + 7);
  renderCalendar();
};

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCalendar(); // render empty grid immediately
fetchEvents();    // then load events
setInterval(fetchEvents, 15 * 60 * 1000); // refresh every 15 min
</script>
