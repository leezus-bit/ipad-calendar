<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f0e8;--paper:#fffdf8;--ink:#2c2416;--ink-soft:#7a6e5f;--ink-faint:#b5a99a;--accent:#c17b3a;--accent-light:#f0d9c0;--green:#4a7c59;--green-light:#d4e8da;--blue:#3a6b9a;--blue-light:#cfe0f0;--rose:#a84f5a;--rose-light:#f0d4d7;--purple:#6b4a8a;--purple-light:#e0d4f0;--gold:#b8902a;--gold-light:#f5e8c0;--border:#e0d8cc;--shadow:rgba(44,36,22,0.08);}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--ink);overflow:hidden;}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;padding:16px;gap:14px;}
.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:var(--paper);border-radius:20px;padding:14px 22px;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);position:relative;}
.weather-block{display:flex;align-items:center;gap:10px;}
.weather-icon{font-size:32px;line-height:1;}
.weather-temp{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink);line-height:1;}
.weather-desc{font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:2px;}
.date-block{text-align:center;}
.date-day{font-family:'Playfair Display',serif;font-size:15px;color:var(--ink-soft);letter-spacing:2px;text-transform:uppercase;}
.date-full{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);line-height:1.2;margin-top:2px;}
.clock-block{text-align:right;}
.clock-time{font-family:'Playfair Display',serif;font-size:36px;color:var(--ink);line-height:1;letter-spacing:-1px;}
.clock-ampm{font-size:14px;color:var(--ink-soft);font-weight:500;}
.secret-trigger{position:absolute;bottom:10px;right:16px;font-size:14px;opacity:0.25;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.main{display:grid;grid-template-columns:1fr 300px;gap:14px;min-height:0;}
.cal-panel{background:var(--paper);border-radius:20px;padding:18px;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);display:flex;flex-direction:column;min-height:0;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav{background:var(--bg);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.cal-month-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);}
.view-toggle{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:2px;border:1px solid var(--border);}
.view-btn{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--ink-soft);font-family:'Nunito',sans-serif;}
.view-btn.active{background:var(--paper);color:var(--accent);box-shadow:0 1px 4px var(--shadow);}
.cal-grid{flex:1;display:flex;flex-direction:column;min-height:0;}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;}
.day-label{text-align:center;font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:1px;text-transform:uppercase;padding:4px 0;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:3px;flex:1;min-height:0;}
.day-cell{border-radius:10px;padding:5px 6px;background:var(--bg);border:1px solid transparent;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;}
.day-cell.empty{background:transparent;cursor:default;}
.day-cell.today{background:var(--accent-light);border-color:var(--accent);}
.day-num{font-size:13px;font-weight:600;color:var(--ink-soft);line-height:1;margin-bottom:3px;}
.day-cell.today .day-num{color:var(--accent);font-weight:700;}
.event-dot-row{display:flex;flex-wrap:wrap;gap:2px;}
.event-dot{height:5px;border-radius:3px;flex:1;min-width:5px;max-width:18px;}
.event-pill-sm{font-size:9px;font-weight:600;border-radius:4px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-top:1px;line-height:1.4;}
.week-view{flex:1;display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
.week-day{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.week-day:last-child{border-bottom:none;}
.week-day-label{width:48px;flex-shrink:0;text-align:center;}
.week-day-name{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1px;}
.week-day-num{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink-soft);line-height:1;}
.week-day.today-row .week-day-num{color:var(--accent);}
.week-events{flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;}
.week-event{border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;}
.week-no-events{font-size:12px;color:var(--ink-faint);font-style:italic;padding:4px 0;}
.sidebar{display:flex;flex-direction:column;gap:12px;min-height:0;}
.upcoming-panel{background:var(--paper);border-radius:20px;padding:16px;box-shadow:0 2px 12px var(--shadow);border:1px solid var(--border);flex:1;display:flex;flex-direction:column;min-height:0;}
.panel-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink);margin-bottom:12px;flex-shrink:0;}
.event-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
.event-card{border-radius:12px;padding:10px 12px;border-left:3px solid;}
.event-card-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
.event-card-time{font-size:11px;color:var(--ink-soft);margin-top:3px;font-weight:500;}
.event-card-date{font-size:10px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.loading-msg{font-size:13px;color:var(--ink-soft);text-align:center;padding:20px;font-style:italic;}
.error-msg{font-size:12px;color:var(--rose);text-align:center;padding:10px;}
.ec-0{background:var(--accent-light);border-color:var(--accent);}.ec-0 .event-dot,.week-event.ec-0{background:var(--accent);}.ec-0 .event-pill-sm{background:var(--accent-light);color:var(--accent);}
.ec-1{background:var(--green-light);border-color:var(--green);}.ec-1 .event-dot,.week-event.ec-1{background:var(--green);color:#fff;}.ec-1 .event-pill-sm{background:var(--green-light);color:var(--green);}
.ec-2{background:var(--blue-light);border-color:var(--blue);}.ec-2 .event-dot,.week-event.ec-2{background:var(--blue);color:#fff;}.ec-2 .event-pill-sm{background:var(--blue-light);color:var(--blue);}
.ec-3{background:var(--rose-light);border-color:var(--rose);}.ec-3 .event-dot,.week-event.ec-3{background:var(--rose);color:#fff;}.ec-3 .event-pill-sm{background:var(--rose-light);color:var(--rose);}
.ec-4{background:var(--purple-light);border-color:var(--purple);}.ec-4 .event-dot,.week-event.ec-4{background:var(--purple);color:#fff;}.ec-4 .event-pill-sm{background:var(--purple-light);color:var(--purple);}
.ec-5{background:var(--gold-light);border-color:var(--gold);}.ec-5 .event-dot,.week-event.ec-5{background:var(--gold);color:#fff;}.ec-5 .event-pill-sm{background:var(--gold-light);color:var(--gold);}
.budget-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(44,36,22,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.budget-overlay.visible{display:flex;}
.budget-panel{background:var(--paper);border-radius:24px;padding:24px;width:92vw;max-width:820px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(44,36,22,0.25);border:1px solid var(--border);}
.budget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.budget-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);}
.budget-close{background:var(--bg);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.income-section{background:var(--green-light);border-radius:16px;padding:16px 20px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.income-stat{text-align:center;}
.income-label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.income-value{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);}
.income-value.positive{color:var(--green);}.income-value.negative{color:var(--rose);}
.month-selector select{font-family:'Nunito',sans-serif;font-size:13px;padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);cursor:pointer;}
.budget-grid{display:flex;flex-direction:column;gap:10px;}
.budget-type-header{font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1.5px;margin-top:8px;margin-bottom:4px;}
.budget-row{display:grid;grid-template-columns:160px 1fr 80px 80px;gap:12px;align-items:center;}
.budget-name{font-size:13px;font-weight:600;color:var(--ink);}
.budget-bar-wrap{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.budget-bar{height:100%;border-radius:4px;transition:width 0.4s ease;}
.bar-ok{background:var(--green);}.bar-warn{background:var(--gold);}.bar-over{background:var(--rose);}
.budget-spent{font-size:12px;font-weight:600;color:var(--ink-soft);text-align:right;}
.budget-limit{font-size:11px;color:var(--ink-faint);text-align:right;}
.budget-loading{text-align:center;padding:30px;color:var(--ink-soft);font-style:italic;}
</style>
</head>

async function buildJWT(scope){
  var now=Math.floor(Date.now()/1000);
  function b64u(o){return btoa(JSON.stringify(o)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
  var hdr=b64u({alg:'RS256',typ:'JWT'});
  var clm=b64u({iss:SAE,scope:scope,aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
  var si=hdr+'.'+clm;
  var pem=PK.replace('-----BEGIN PRIVATE KEY-----','').replace('-----END PRIVATE KEY-----','').replace(/\s/g,'');
  var bin=Uint8Array.from(atob(pem),function(c){return c.charCodeAt(0);});
  var key=await crypto.subtle.importKey('pkcs8',bin.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  var sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(si));
  var sb=btoa(String.fromCharCode.apply(null,new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  return si+'.'+sb;
}

    var s=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
    var e=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString();
    var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events?timeMin='+s+'&timeMax='+e+'&singleEvents=true&orderBy=startTime&maxResults=200';
    var r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
    var d=await r.json();
    if(d.error)throw new Error(d.error.message);
    events=(d.items||[]).map(function(ev,i){
      return{id:ev.id,title:ev.summary||'(No title)',start:new Date(ev.start.dateTime||ev.start.date),end:ev.end?new Date(ev.end.dateTime||ev.end.date):null,allDay:!ev.start.dateTime,ck:ev.colorId||(i%6)+''};
    });
    var keys=[];events.forEach(function(e){if(keys.indexOf(e.ck)<0)keys.push(e.ck);});
    keys.forEach(function(k,i){cmap[k]=COLORS[i%COLORS.length];});
    renderCalendar();renderUpcoming();
  }catch(e){
    document.getElementById('eventList').innerHTML='<div class="error-msg">Calendar error: '+e.message+'</div>';
  }
}
async function fetchSheet(tab,range){
  var tok=await getSheetsToken();
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(tab+'!'+range);
  var r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
  var d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.values||[];
}
async function fetchBudget(){
  try{
    var b=await fetchSheet(TAB_BUDGET,'A:C');
    var cc=await fetchSheet(TAB_CC,'A:G');
    var deb=await fetchSheet(TAB_DEBIT,'A:F');
    bdata.budget=b;bdata.cc=cc;bdata.debit=deb;
    bloaded=true;fillMonths();renderBudget();
  }catch(e){
    document.getElementById('budgetGrid').innerHTML='<div class="budget-loading" style="color:var(--rose)">Error: '+e.message+'</div>';
  }
}
function fillMonths(){
  var sel=document.getElementById('budgetMonth');var now=new Date();sel.innerHTML='';
  for(var i=0;i<=now.getMonth();i++){
    var o=document.createElement('option');o.value=i;o.textContent=MONTHS[i]+' '+now.getFullYear();
    if(i===now.getMonth())o.selected=true;sel.appendChild(o);
  }
}
function pm(v){if(!v)return 0;return parseFloat(String(v).replace(/[$,\s]/g,''))||0;}
function pd(v){if(!v)return null;var d=new Date(v);return isNaN(d.getTime())?null:d;}

  function renderBudget(){
  if(!bloaded)return;
  var mo=parseInt(document.getElementById('budgetMonth').value);
  var yr=new Date().getFullYear();
  var items=[];
  for(var i=1;i<bdata.budget.length;i++){
    var row=bdata.budget[i];if(!row||!row[1])continue;
    items.push({type:(row[0]||'Other').trim(),name:row[1].trim(),limit:pm(row[2])});
  }
  var ccsp={};
  for(var i=1;i<bdata.cc.length;i++){
    var row=bdata.cc[i];if(!row)continue;
    var dt=pd(row[0]);if(!dt||dt.getMonth()!==mo||dt.getFullYear()!==yr)continue;
    if((row[4]||'').toLowerCase()==='credit')continue;
    var amt=pm(row[5]);if(!amt)continue;
    var cat=CC_MAP[(row[3]||'').toLowerCase().trim()]||'Other';
    ccsp[cat]=(ccsp[cat]||0)+Math.abs(amt);
  }
  var dbsp={};var dep=0;
  for(var i=1;i<bdata.debit.length;i++){
    var row=bdata.debit[i];if(!row)continue;
    var dt=pd(row[2]);if(!dt||dt.getMonth()!==mo||dt.getFullYear()!==yr)continue;
    var type=(row[3]||'').toLowerCase();
    var amt=pm(row[4]);if(!amt)continue;
    if(type==='credit'){dep+=amt;continue;}
    var desc=(row[1]||'').toLowerCase();
    var matched='Other';
    for(var j=0;j<DEBIT_MAP.length;j++){
      var found=false;
      for(var k=0;k<DEBIT_MAP[j].k.length;k++){if(desc.indexOf(DEBIT_MAP[j].k[k])>=0){found=true;break;}}
      if(found){matched=DEBIT_MAP[j].c;break;}
    }
    if(matched==='Transfer')continue;
    dbsp[matched]=(dbsp[matched]||0)+amt;
  }
  var allsp={};
  Object.keys(dbsp).forEach(function(k){allsp[k]=(allsp[k]||0)+dbsp[k];});
  Object.keys(ccsp).forEach(function(k){allsp[k]=(allsp[k]||0)+ccsp[k];});
  var total=0;Object.keys(allsp).forEach(function(k){total+=allsp[k];});
  document.getElementById('incomeActual').textContent='$'+Math.round(dep).toLocaleString();
  document.getElementById('incomeActual').className='income-value '+(dep>=INCOME_BUDGET?'positive':'negative');
  document.getElementById('totalSpent').textContent='$'+Math.round(total).toLocaleString();
  document.getElementById('totalSpent').className='income-value '+(total>INCOME_BUDGET?'negative':'');
  var groups={};
  items.forEach(function(it){if(!groups[it.type])groups[it.type]=[];groups[it.type].push(it);});
  var html='';
  Object.keys(groups).forEach(function(type){
    html+='<div class="budget-type-header">'+type+'</div>';
    groups[type].forEach(function(it){
      var spent=allsp[it.name]||0;
      var pct=it.limit>0?Math.min(spent/it.limit*100,100):0;
      var bc=pct>=100?'bar-over':pct>=80?'bar-warn':'bar-ok';
      html+='<div class="budget-row">';
      html+='<div class="budget-name">'+it.name+'</div>';
      html+='<div class="budget-bar-wrap"><div class="budget-bar '+bc+'" style="width:'+pct.toFixed(1)+'%"></div></div>';
      html+='<div class="budget-spent">$'+Math.round(spent).toLocaleString()+'</div>';
      html+='<div class="budget-limit">of $'+Math.round(it.limit).toLocaleString()+'</div>';
      html+='</div>';
    });
  });
  document.getElementById('budgetGrid').innerHTML=html||'<div class="budget-loading">No data found.</div>';
}
function openBudget(){document.getElementById('budgetOverlay').classList.add('visible');if(!bloaded)fetchBudget();}
function closeBudget(){document.getElementById('budgetOverlay').classList.remove('visible');}
function eventsOn(date){
  return events.filter(function(ev){
    var a=new Date(ev.start.getFullYear(),ev.start.getMonth(),ev.start.getDate());
    var b=new Date(date.getFullYear(),date.getMonth(),date.getDate());
    return a.getTime()===b.getTime();
  });
}
function fmtTime(d){var h=d.getHours(),m=d.getMinutes(),ap=h>=12?'pm':'am';h=h%12||12;return h+':'+(m<10?'0':'')+m+ap;}
function weekStart(date){var d=new Date(date);d.setDate(d.getDate()-d.getDay());return d;}
function setView(v){
  curView=v;
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  viewDate=new Date();renderCalendar();
}
function renderCalendar(){
  document.getElementById('calMonthTitle').textContent=MONTHS[viewDate.getMonth()]+' '+viewDate.getFullYear();
  if(curView==='month')renderMonth();else renderWeek();
}
function renderMonth(){
  var y=viewDate.getFullYear(),m=viewDate.getMonth();
  var first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=new Date();
  var html='<div class="day-labels">'+DAYS.map(function(d){return'<div class="day-label">'+d+'</div>';}).join('')+'</div><div class="month-grid">';
  for(var i=0;i<first;i++)html+='<div class="day-cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var dt=new Date(y,m,d),isT=dt.toDateString()===today.toDateString();
    var de=eventsOn(dt);
    html+='<div class="day-cell'+(isT?' today':'')+'"><div class="day-num">'+d+'</div>';
    if(de.length){
      html+='<div class="event-dot-row">';
      for(var x=0;x<Math.min(de.length,3);x++)html+='<div class="event-dot '+(cmap[de[x].ck]||'ec-0')+'"></div>';
      html+='</div><div class="event-pill-sm '+(cmap[de[0].ck]||'ec-0')+'">'+de[0].title+'</div>';
    }
    html+='</div>';
  }
  for(var i=0;i<42-first-dim;i++)html+='<div class="day-cell empty"></div>';
  html+='</div>';
  document.getElementById('calGrid').innerHTML=html;
}
function renderWeek(){
  var mon=weekStart(viewDate),today=new Date(),html='<div class="week-view">';
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var isT=d.toDateString()===today.toDateString(),de=eventsOn(d);
    html+='<div class="week-day'+(isT?' today-row':'')+'"><div class="week-day-label"><div class="week-day-name">'+DAYS[d.getDay()]+'</div><div class="week-day-num">'+d.getDate()+'</div></div><div class="week-events">';
    if(!de.length)html+='<div class="week-no-events">No events</div>';
    else for(var x=0;x<Math.min(de.length,3);x++)html+='<div class="week-event '+(cmap[de[x].ck]||'ec-0')+'">'+de[x].title+' <span style="font-weight:300;font-size:10px;">'+(de[x].allDay?'All day':fmtTime(de[x].start))+'</span></div>';
    html+='</div></div>';
  }
  document.getElementById('calGrid').innerHTML=html+'</div>';
}
function renderUpcoming(){
  var now=new Date();
  var fut=events.filter(function(ev){return ev.start>=now||ev.start.toDateString()===now.toDateString();});
  fut.sort(function(a,b){return a.start-b.start;});fut=fut.slice(0,15);
  if(!fut.length){document.getElementById('eventList').innerHTML='<div class="loading-msg">No upcoming events</div>';return;}
  var ld='',html='';
  fut.forEach(function(ev){
    var cls=cmap[ev.ck]||'ec-0';
    var ds=ev.start.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if(ds!==ld){html+='<div class="event-card-date">'+ds+'</div>';ld=ds;}
    var t=ev.allDay?'All day':fmtTime(ev.start)+(ev.end?' - '+fmtTime(ev.end):'');
    html+='<div class="event-card '+cls+'"><div class="event-card-title">'+ev.title+'</div><div class="event-card-time">'+t+'</div></div>';
  });
  document.getElementById('eventList').innerHTML=html;
}
window.onload=function(){
  document.getElementById('prevBtn').onclick=function(){if(curView==='month')viewDate.setMonth(viewDate.getMonth()-1);else viewDate.setDate(viewDate.getDate()-7);renderCalendar();};
  document.getElementById('nextBtn').onclick=function(){if(curView==='month')viewDate.setMonth(viewDate.getMonth()+1);else viewDate.setDate(viewDate.getDate()+7);renderCalendar();};
  document.getElementById('secretTrigger').addEventListener('click',function(){
    stc++;clearTimeout(stt);stt=setTimeout(function(){stc=0;},800);
    if(stc>=2){stc=0;openBudget();}
  });
  document.getElementById('budgetOverlay').addEventListener('click',function(e){
    if(e.target===document.getElementById('budgetOverlay'))closeBudget();
  });
  renderCalendar();
  fetchEvents();
  setInterval(fetchEvents,900000);
};
</script>
