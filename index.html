<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8; --paper: #fffdf8; --ink: #2c2416; --ink-soft: #7a6e5f; --ink-faint: #b5a99a;
    --accent: #c17b3a; --accent-light: #f0d9c0; --green: #4a7c59; --green-light: #d4e8da;
    --blue: #3a6b9a; --blue-light: #cfe0f0; --rose: #a84f5a; --rose-light: #f0d4d7;
    --purple: #6b4a8a; --purple-light: #e0d4f0; --gold: #b8902a; --gold-light: #f5e8c0;
    --border: #e0d8cc; --shadow: rgba(44,36,22,0.08);
  }
  html, body { width:100%; height:100%; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--ink); overflow:hidden; }
  .app { display:grid; grid-template-rows:auto 1fr; height:100vh; padding:16px; gap:14px; }
  .topbar { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; background:var(--paper); border-radius:20px; padding:14px 22px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); position:relative; }
  .weather-block { display:flex; align-items:center; gap:10px; }
  .weather-icon { font-size:32px; line-height:1; }
  .weather-temp { font-family:'Playfair Display',serif; font-size:28px; color:var(--ink); line-height:1; }
  .weather-desc { font-size:12px; color:var(--ink-soft); font-weight:500; margin-top:2px; }
  .date-block { text-align:center; }
  .date-day { font-family:'Playfair Display',serif; font-size:15px; color:var(--ink-soft); letter-spacing:2px; text-transform:uppercase; }
  .date-full { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); line-height:1.2; margin-top:2px; }
  .clock-block { text-align:right; }
  .clock-time { font-family:'Playfair Display',serif; font-size:36px; color:var(--ink); line-height:1; letter-spacing:-1px; }
  .clock-ampm { font-size:14px; color:var(--ink-soft); font-weight:500; }
  .secret-trigger { position:absolute; bottom:10px; right:16px; font-size:14px; opacity:0.25; cursor:pointer; user-select:none; transition:opacity 0.2s; -webkit-tap-highlight-color:transparent; }
  .secret-trigger:hover { opacity:0.4; }
  .main { display:grid; grid-template-columns:1fr 300px; gap:14px; min-height:0; position:relative; }
  .cal-panel { background:var(--paper); border-radius:20px; padding:18px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); display:flex; flex-direction:column; min-height:0; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-nav { background:var(--bg); border:1px solid var(--border); border-radius:10px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); transition:background 0.15s; }
  .cal-nav:hover { background:var(--accent-light); color:var(--accent); }
  .cal-month-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); }
  .view-toggle { display:flex; background:var(--bg); border-radius:10px; padding:3px; gap:2px; border:1px solid var(--border); }
  .view-btn { padding:5px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--ink-soft); transition:all 0.15s; font-family:'Nunito',sans-serif; }
  .view-btn.active { background:var(--paper); color:var(--accent); box-shadow:0 1px 4px var(--shadow); }
  .cal-grid { flex:1; display:flex; flex-direction:column; min-height:0; }
  .day-labels { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:6px; }
  .day-label { text-align:center; font-size:11px; font-weight:700; color:var(--ink-faint); letter-spacing:1px; text-transform:uppercase; padding:4px 0; }
  .month-grid { display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(6,1fr); gap:3px; flex:1; min-height:0; }
  .day-cell { border-radius:10px; padding:5px 6px; background:var(--bg); border:1px solid transparent; cursor:pointer; transition:all 0.15s; overflow:hidden; display:flex; flex-direction:column; }
  .day-cell:hover { border-color:var(--border); background:#ede8df; }
  .day-cell.empty { background:transparent; cursor:default; }
  .day-cell.today { background:var(--accent-light); border-color:var(--accent); }
  .day-num { font-size:13px; font-weight:600; color:var(--ink-soft); line-height:1; margin-bottom:3px; }
  .day-cell.today .day-num { color:var(--accent); font-weight:700; }
  .event-dot-row { display:flex; flex-wrap:wrap; gap:2px; }
  .event-dot { height:5px; border-radius:3px; flex:1; min-width:5px; max-width:18px; }
  .event-pill-sm { font-size:9px; font-weight:600; border-radius:4px; padding:1px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; margin-top:1px; line-height:1.4; }
  .week-view { flex:1; display:flex; flex-direction:column; min-height:0; overflow-y:auto; }
  .week-day { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .week-day:last-child { border-bottom:none; }
  .week-day-label { width:48px; flex-shrink:0; text-align:center; }
  .week-day-name { font-size:10px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1px; }
  .week-day-num { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink-soft); line-height:1; }
  .week-day.today-row .week-day-num { color:var(--accent); }
  .week-events { flex:1; display:flex; flex-direction:column; gap:4px; justify-content:center; }
  .week-event { border-radius:8px; padding:5px 10px; font-size:12px; font-weight:600; cursor:pointer; }
  .week-no-events { font-size:12px; color:var(--ink-faint); font-style:italic; padding:4px 0; }
  .sidebar { display:flex; flex-direction:column; gap:12px; min-height:0; }
  .upcoming-panel { background:var(--paper); border-radius:20px; padding:16px; box-shadow:0 2px 12px var(--shadow); border:1px solid var(--border); flex:1; display:flex; flex-direction:column; min-height:0; }
  .panel-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--ink); margin-bottom:12px; flex-shrink:0; }
  .event-list { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:8px; }
  .event-list::-webkit-scrollbar { width:4px; }
  .event-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .event-card { border-radius:12px; padding:10px 12px; border-left:3px solid; cursor:pointer; transition:transform 0.1s; }
  .event-card:hover { transform:translateX(2px); }
  .event-card-title { font-size:13px; font-weight:600; color:var(--ink); line-height:1.3; }
  .event-card-time { font-size:11px; color:var(--ink-soft); margin-top:3px; font-weight:500; }
  .event-card-date { font-size:10px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
  .loading-msg { font-size:13px; color:var(--ink-soft); text-align:center; padding:20px; font-style:italic; }
  .error-msg { font-size:12px; color:var(--rose); text-align:center; padding:10px; }
  .ec-0 { background:var(--accent-light); border-color:var(--accent); }
  .ec-0 .event-dot,.week-event.ec-0 { background:var(--accent); color:var(--ink); }
  .ec-0 .event-pill-sm { background:var(--accent-light); color:var(--accent); }
  .ec-1 { background:var(--green-light); border-color:var(--green); }
  .ec-1 .event-dot,.week-event.ec-1 { background:var(--green); color:#fff; }
  .ec-1 .event-pill-sm { background:var(--green-light); color:var(--green); }
  .ec-2 { background:var(--blue-light); border-color:var(--blue); }
  .ec-2 .event-dot,.week-event.ec-2 { background:var(--blue); color:#fff; }
  .ec-2 .event-pill-sm { background:var(--blue-light); color:var(--blue); }
  .ec-3 { background:var(--rose-light); border-color:var(--rose); }
  .ec-3 .event-dot,.week-event.ec-3 { background:var(--rose); color:#fff; }
  .ec-3 .event-pill-sm { background:var(--rose-light); color:var(--rose); }
  .ec-4 { background:var(--purple-light); border-color:var(--purple); }
  .ec-4 .event-dot,.week-event.ec-4 { background:var(--purple); color:#fff; }
  .ec-4 .event-pill-sm { background:var(--purple-light); color:var(--purple); }
  .ec-5 { background:var(--gold-light); border-color:var(--gold); }
  .ec-5 .event-dot,.week-event.ec-5 { background:var(--gold); color:#fff; }
  .ec-5 .event-pill-sm { background:var(--gold-light); color:var(--gold); }
  .budget-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(44,36,22,0.55); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
  .budget-overlay.visible { display:flex; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .budget-panel { background:var(--paper); border-radius:24px; padding:24px; width:92vw; max-width:820px; max-height:88vh; overflow-y:auto; box-shadow:0 8px 40px rgba(44,36,22,0.25); border:1px solid var(--border); animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .budget-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .budget-title { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); }
  .budget-close { background:var(--bg); border:1px solid var(--border); border-radius:10px; width:36px; height:36px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); }
  .income-section { background:var(--green-light); border-radius:16px; padding:16px 20px; margin-bottom:20px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .income-stat { text-align:center; }
  .income-label { font-size:11px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .income-value { font-family:'Playfair Display',serif; font-size:20px; color:var(--ink); }
  .income-value.positive { color:var(--green); }
  .income-value.negative { color:var(--rose); }
  .month-selector { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .month-selector select { font-family:'Nunito',sans-serif; font-size:13px; padding:6px 12px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--ink); cursor:pointer; }
  .budget-grid { display:flex; flex-direction:column; gap:10px; }
  .budget-type-header { font-size:11px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1.5px; margin-top:8px; margin-bottom:4px; padding-left:4px; }
  .budget-row { display:grid; grid-template-columns:160px 1fr 80px 80px; gap:12px; align-items:center; }
  .budget-name { font-size:13px; font-weight:600; color:var(--ink); }
  .budget-bar-wrap { height:8px; background:var(--bg); border-radius:4px; overflow:hidden; border:1px solid var(--border); }
  .budget-bar { height:100%; border-radius:4px; transition:width 0.4s ease; }
  .bar-ok { background:var(--green); }
  .bar-warn { background:var(--gold); }
  .bar-over { background:var(--rose); }
  .budget-spent { font-size:12px; font-weight:600; color:var(--ink-soft); text-align:right; }
  .budget-limit { font-size:11px; color:var(--ink-faint); text-align:right; }
  .budget-loading { text-align:center; padding:30px; color:var(--ink-soft); font-style:italic; }
</style>

function updateClock() {

  document.getElementById('clockTime').textContent=`${h}:${String(m).padStart(2,'0')}`;

async function loadWeather() {
  try {
    const r=await fetch(`https://wttr.in/${ZIP}?format=j1`);

    document.getElementById('weatherTemp').textContent=`${Math.round(parseInt(cur.temp_F))}°F`;

    document.getElementById('weatherIcon').textContent=weatherEmoji(parseInt(cur.weatherCode));
  } catch(e){document.getElementById('weatherDesc').textContent='Weather unavailable';}
}

  if(c===113)return'☀️';if(c===116)return'⛅';if([119,122].includes(c))return'☁️';

  try {
    const now=Math.floor(Date.now()/1000);
    const b64=obj=>btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const header=b64({alg:'RS256',typ:'JWT'});
    const claim=b64({iss:SERVICE_ACCOUNT_EMAIL,scope,aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now});
    const sigInput=`${header}.${claim}`;
    const pem=PRIVATE_KEY.replace('-----BEGIN PRIVATE KEY-----','').replace('-----END PRIVATE KEY-----','').replace(/\s/g,'');
    const bin=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
    const key=await crypto.subtle.importKey('pkcs8',bin.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
    const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(sigInput));
    const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
    const jwt=`${sigInput}.${sigB64}`;
    const resp=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
    const data=await resp.json();
    if(!data.access_token)throw new Error(JSON.stringify(data));
    if(scope.includes('calendar')){gcToken=data.access_token;gcTokenExpiry=Date.now()+(data.expires_in*1000);}
else{sheetsToken=data.access_token;sheetsTokenExpiry=Date.now()+(data.expires_in*1000);}
    return data.access_token;
  } catch(e){
    document.getElementById('eventList').innerHTML=`<div class="error-msg">⚠️ Auth error:<br><small>${e.message}</small></div>`;
    return null;
  }
}

async function fetchEvents() {
  const token=await getToken('https://www.googleapis.com/auth/calendar.readonly');
  if(!token)return;
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
  const end=new Date(now.getFullYear(),now.getMonth()+3,0).toISOString();
  try {
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=200`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    const data=await r.json();
    if(data.error)throw new Error(data.error.message);
    allEvents=(data.items||[]).map((ev,i)=>({
      id:ev.id,title:ev.summary||'(No title)',
      start:new Date(ev.start?.dateTime||ev.start?.date),
      end:ev.end?new Date(ev.end?.dateTime||ev.end?.date):null,
      allDay:!ev.start?.dateTime,colorKey:ev.colorId||(i%6).toString()
    }));
    const keys=[...new Set(allEvents.map(e=>e.colorKey))];
    keys.forEach((k,i)=>{colorMap[k]=COLOR_CLASSES[i%COLOR_CLASSES.length];});
    renderCalendar(); renderUpcoming();
  } catch(e){document.getElementById('eventList').innerHTML=`<div class="error-msg">⚠️ ${e.message}</div>`;}
}

async function fetchSheetRange(tab,range,token){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab+'!'+range)}`;
  const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  const data=await r.json();
  if(data.error)throw new Error(`Sheet error: ${data.error.message}`);
  return data.values||[];
}

async function fetchBudgetData(){
  const token=await getToken('https://www.googleapis.com/auth/spreadsheets.readonly');
  if(!token)return;
  try {
    const [b,cc,deb]=await Promise.all([
      fetchSheetRange(TAB_BUDGET,'A:C',token),
      fetchSheetRange(TAB_CC,'A:G',token),
      fetchSheetRange(TAB_DEBIT,'A:F',token),
    ]);
    budgetData.budget=b; budgetData.cc=cc; budgetData.debit=deb;
    budgetLoaded=true; populateMonthSelector(); renderBudget();
  } catch(e){
    document.getElementById('budgetGrid').innerHTML=`<div class="budget-loading" style="color:var(--rose)">⚠️ ${e.message}</div>`;
  }
}

function populateMonthSelector(){
  const sel=document.getElementById('budgetMonth'); const now=new Date(); sel.innerHTML='';
  for(let i=0;i<=now.getMonth();i++){
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=MONTHS[i]+' '+now.getFullYear();
    if(i===now.getMonth())opt.selected=true; sel.appendChild(opt);
  }
}

function parseMoney(v){if(!v)return 0;return parseFloat(String(v).replace(/[$,\s]/g,''))||0;}
function parseDate(v){if(!v)return null;const d=new Date(v);return isNaN(d)?null:d;}
function renderBudget(){
  if(!budgetLoaded)return;
  const selectedMonth=parseInt(document.getElementById('budgetMonth').value);
  const year=new Date().getFullYear();
  const budgetItems=[];
  for(let i=1;i<budgetData.budget.length;i++){
    const row=budgetData.budget[i];
    if(!row||!row[1])continue;
    budgetItems.push({type:(row[0]||'Other').trim(),name:row[1].trim(),limit:parseMoney(row[2])});
  }
  const ccSpend={}; let debitDep=0;
  for(let i=1;i<budgetData.debit.length;i++){
    const row=budgetData.debit[i]; if(!row)continue;
    const d=parseDate(row[2]); if(!d||d.getMonth()!==selectedMonth||d.getFullYear()!==year)continue;
    const type=(row[3]||'').toLowerCase(); const amt=parseMoney(row[4]);
    if(type==='credit'){debitDep+=amt;continue;}
    const desc=(row[1]||'').toLowerCase();
    let matched='Other';
    for(const m of DEBIT_KW_MAP){if(m.kw.some(k=>desc.includes(k))){matched=m.cat;break;}}
    if(matched==='Transfer')continue;
    debitSpend[matched]=(debitSpend[matched]||0)+amt;
  }
  const debitSpend={}; let debitDep=0;
  for(let i=1;i<budgetData.debit.length;i++){
    const row=budgetData.debit[i]; if(!row)continue;
    const d=parseDate(row[2]); if(!d||d.getMonth()!==selectedMonth||d.getFullYear()!==year)continue;
    const type=(row[3]||'').toLowerCase(); const amt=parseMoney(row[4]);
    if(type==='credit'||amt>0){debitDep+=Math.abs(amt);continue;}
    const desc=(row[1]||'').toLowerCase();
    let matched='Other';
    for(const m of DEBIT_KW_MAP){if(m.kw.some(k=>desc.includes(k))){matched=m.cat;break;}}
    if(matched==='Transfer')continue;
    debitSpend[matched]=(debitSpend[matched]||0)+Math.abs(amt);
  }
  const allSpend={...debitSpend};
  for(const[cat,amt]of Object.entries(ccSpend)){allSpend[cat]=(allSpend[cat]||0)+amt;}
  const totalSpent=Object.values(allSpend).reduce((a,b)=>a+b,0);
  document.getElementById('incomeActual').textContent='$'+debitDep.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('incomeActual').className='income-value '+(debitDep>=MONTHLY_INCOME_BUDGET?'positive':'negative');
  document.getElementById('totalSpent').textContent='$'+totalSpent.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('totalSpent').className='income-value '+(totalSpent>MONTHLY_INCOME_BUDGET?'negative':'');
  const typeGroups={};
  for(const item of budgetItems){if(!typeGroups[item.type])typeGroups[item.type]=[];typeGroups[item.type].push(item);}
  let html='';
  for(const[type,items]of Object.entries(typeGroups)){
    html+=`<div class="budget-type-header">${type}</div>`;
    for(const item of items){
      const spent=allSpend[item.name]||0;
      const pct=item.limit>0?Math.min((spent/item.limit)*100,100):0;
      const barClass=pct>=100?'bar-over':pct>=80?'bar-warn':'bar-ok';
      html+=`<div class="budget-row">
        <div class="budget-name">${item.name}</div>
        <div class="budget-bar-wrap"><div class="budget-bar ${barClass}" style="width:${pct}%"></div></div>
        <div class="budget-spent">$${spent.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
        <div class="budget-limit">of $${item.limit.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
      </div>`;
    }
  }
  document.getElementById('budgetGrid').innerHTML=html||'<div class="budget-loading">No data found.</div>';
}

document.getElementById('secretTrigger').addEventListener('click',()=>{
  secretTapCount++; clearTimeout(secretTapTimer);
  secretTapTimer=setTimeout(()=>{secretTapCount=0;},800);
  if(secretTapCount>=2){secretTapCount=0;openBudget();}
});
function openBudget(){document.getElementById('budgetOverlay').classList.add('visible');if(!budgetLoaded)fetchBudgetData();}
function closeBudget(){document.getElementById('budgetOverlay').classList.remove('visible');}
document.getElementById('budgetOverlay').addEventListener('click',(e)=>{if(e.target===document.getElementById('budgetOverlay'))closeBudget();});

function renderCalendar(){
  document.getElementById('calMonthTitle').textContent=`${MONTHS[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
  if(currentView==='month')renderMonth(); else renderWeek();
}
function renderMonth(){
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  const first=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate(),today=new Date();
  let html=`<div class="day-labels">${DAYS.map(d=>`<div class="day-label">${d}</div>`).join('')}</div><div class="month-grid">`;
  for(let i=0;i<first;i++)html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,m,d),isToday=date.toDateString()===today.toDateString();
    const dayEvents=eventsOnDate(date);
    html+=`<div class="day-cell${isToday?' today':''}"><div class="day-num">${d}</div>`;
    if(dayEvents.length){
      html+=`<div class="event-dot-row">`;
      dayEvents.slice(0,3).forEach(ev=>{html+=`<div class="event-dot ${colorMap[ev.colorKey]||'ec-0'}"></div>`;});
      html+=`</div><div class="event-pill-sm ${colorMap[dayEvents[0].colorKey]||'ec-0'}">${dayEvents[0].title}</div>`;
    }
    html+=`</div>`;
  }
  for(let i=0;i<42-first-daysInMonth;i++)html+=`<div class="day-cell empty"></div>`;
  html+=`</div>`;
  document.getElementById('calGrid').innerHTML=html;
}
function renderWeek(){
  const monday=getWeekStart(viewDate),today=new Date();
  let html=`<div class="week-view">`;
  for(let i=0;i<7;i++){
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const isToday=d.toDateString()===today.toDateString(),dayEvents=eventsOnDate(d);
    html+=`<div class="week-day${isToday?' today-row':''}">
      <div class="week-day-label"><div class="week-day-name">${DAYS[d.getDay()]}</div><div class="week-day-num">${d.getDate()}</div></div>
      <div class="week-events">`;
    if(!dayEvents.length)html+=`<div class="week-no-events">No events</div>`;
    else dayEvents.slice(0,3).forEach(ev=>{
      html+=`<div class="week-event ${colorMap[ev.colorKey]||'ec-0'}">${ev.title} <span style="font-weight:300;font-size:10px;">${ev.allDay?'All day':formatTime(ev.start)}</span></div>`;
    });
    html+=`</div></div>`;
  }
  html+=`</div>`;
  document.getElementById('calGrid').innerHTML=html;
}
function renderUpcoming(){
  const now=new Date();
  const future=allEvents.filter(ev=>ev.start>=now||ev.start.toDateString()===now.toDateString()).sort((a,b)=>a.start-b.start).slice(0,15);
  if(!future.length){document.getElementById('eventList').innerHTML='<div class="loading-msg">No upcoming events</div>';return;}
  let lastDate='',html='';
  future.forEach(ev=>{
    const cls=colorMap[ev.colorKey]||'ec-0';
    const dateStr=ev.start.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if(dateStr!==lastDate){html+=`<div class="event-card-date">${dateStr}</div>`;lastDate=dateStr;}
    const time=ev.allDay?'All day':`${formatTime(ev.start)}${ev.end?' – '+formatTime(ev.end):''}`;
    html+=`<div class="event-card ${cls}"><div class="event-card-title">${ev.title}</div><div class="event-card-time">${time}</div></div>`;
  });
  document.getElementById('eventList').innerHTML=html;
}
function eventsOnDate(date){
  return allEvents.filter(ev=>{
    const a=new Date(ev.start.getFullYear(),ev.start.getMonth(),ev.start.getDate());
    const b=new Date(date.getFullYear(),date.getMonth(),date.getDate());
    return a.getTime()===b.getTime();
  });
}
function formatTime(date){let h=date.getHours(),m=date.getMinutes();const ampm=h>=12?'pm':'am';h=h%12||12;return`${h}:${String(m).padStart(2,'0')}${ampm}`;}
function getWeekStart(date){const d=new Date(date);d.setDate(d.getDate()-d.getDay());return d;}
function setView(v){
  currentView=v;
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('btnWeek').classList.toggle('active',v==='week');
  viewDate=new Date();renderCalendar();
}
document.getElementById('prevBtn').onclick=()=>{if(currentView==='month')viewDate.setMonth(viewDate.getMonth()-1);else viewDate.setDate(viewDate.getDate()-7);renderCalendar();};
document.getElementById('nextBtn').onclick=()=>{if(currentView==='month')viewDate.setMonth(viewDate.getMonth()+1);else viewDate.setDate(viewDate.getDate()+7);renderCalendar();};

renderCalendar();
fetchEvents();
setInterval(fetchEvents,15*60*1000);
</script>
